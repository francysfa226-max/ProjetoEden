<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Monitoramento - Produção</title>
    <style>
        /* === VARIÁVEIS EXTRATERRESTRES === */
        :root {
            --bg-base: #f0f2f5;
            --bg-ambient-1: rgba(249, 38, 114, 0.08); 
            --bg-ambient-2: rgba(0, 122, 255, 0.08);  
            
            --glass-bg: rgba(255, 255, 255, 0.75); 
            --card-bg: #ffffff; 
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-blur: blur(20px) saturate(180%);
            
            --text-main: #1d1d1f;
            --text-sec: #86868b;
            --text-value: #000000;
            
            --color-rodando: #34c759;
            --color-parada: #ff3b30;
            --color-quebrada: #ffcc00;
            --color-numix: #f1544d;
            
            --shadow-soft: 0 8px 25px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 15px 35px rgba(0, 0, 0, 0.1);
            --shadow-glass: inset 0 1px 1px rgba(255, 255, 255, 0.8);
            
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        body.dark-mode {
            --bg-base: #0a0a0c;
            --bg-ambient-1: rgba(249, 38, 114, 0.12);
            --bg-ambient-2: rgba(10, 132, 255, 0.12);
            
            --glass-bg: rgba(28, 28, 32, 0.65);
            --card-bg: #1c1c1f; 
            --glass-border: rgba(255, 255, 255, 0.08);
            
            --text-main: #f5f5f7;
            --text-sec: #a1a1a6;
            --text-value: #ffffff;
            
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 20px 40px rgba(0, 0, 0, 0.6);
            --shadow-glass: inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(circle at 15% 50%, var(--bg-ambient-1), transparent 40%),
                radial-gradient(circle at 85% 30%, var(--bg-ambient-2), transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            padding: 20px; 
            min-height: 100vh;
            transition: background-color 0.4s ease, color 0.4s ease; 
        }
        
        .header { 
            position: sticky; top: 15px; z-index: 1000; 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 30px; padding: 15px 25px; 
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border); border-radius: var(--radius-xl); 
            box-shadow: var(--shadow-soft), var(--shadow-glass);
            flex-wrap: wrap; gap: 15px; 
        }
        .header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
        .header p { font-size: 0.85rem; font-weight: 500; color: var(--text-sec); margin-top: 2px;}

        .main-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 25px; align-items: start; }
        .machine-container { background: transparent; width: 100%; }
        .machine-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        
        .flip-card { background-color: transparent; perspective: 1200px; width: 100%; min-height: 170px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: left; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); transform-style: preserve-3d; display: grid; grid-template-columns: 1fr; }
        .flip-card:hover .flip-card-inner { transform: translateY(-4px); }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); z-index: 10; }
        
        .flip-card-front, .flip-card-back { grid-area: 1 / 1 / 2 / 2; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: var(--radius-lg); background: var(--card-bg); border: 1px solid var(--glass-border); box-shadow: var(--shadow-soft); padding: 16px; display: flex; flex-direction: column; justify-content: space-between; transform: translateZ(0); }
        .flip-card-front.status-rodando::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; border-radius: var(--radius-lg) 0 0 var(--radius-lg); opacity: 0.9; background: var(--color-rodando); box-shadow: 2px 0 10px rgba(52,199,89,0.3); }
        .flip-card-front.status-parada::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; border-radius: var(--radius-lg) 0 0 var(--radius-lg); opacity: 0.9; background: var(--color-parada); box-shadow: 2px 0 10px rgba(255,59,48,0.3); }
        .flip-card-front.status-quebrada::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; border-radius: var(--radius-lg) 0 0 var(--radius-lg); opacity: 0.9; background: var(--color-quebrada); box-shadow: 2px 0 10px rgba(255,204,0,0.3); }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .card-header h2 { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.5px; margin: 0; }
        .badge-repetido { background: var(--color-numix); color: #fff; padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: 800; margin-left: 8px; }
        
        .info-row { display: flex; flex-direction: column; margin-bottom: 12px; }
        .info-label { font-size: 9px; font-weight: 700; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
        .info-value { font-size: 13px; font-weight: 700; color: var(--text-value); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: auto; }
        .stat-box { text-align: center; padding: 8px 4px; border-radius: var(--radius-md); background: rgba(120, 120, 128, 0.08); border: 1px solid rgba(120, 120, 128, 0.05); }
        .stat-num { display: block; font-size: 18px; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; }
        .stat-label { font-size: 8px; font-weight: 700; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .flip-card-back { transform: rotateY(180deg) translateZ(1px); padding: 20px; overflow-y: auto; max-height: 240px; }
        .det-sec { margin-bottom: 12px; background: rgba(120, 120, 128, 0.05); padding: 12px; border-radius: var(--radius-md); border: 1px solid rgba(120,120,128,0.08); }
        .det-title { font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; border-bottom: 1px solid rgba(120,120,128,0.1); padding-bottom: 4px;}
        .det-item { font-size: 11px; color: var(--text-main); margin-bottom: 10px; font-weight: 700; line-height: 1.5; }
        .det-item span.prs { background: var(--color-numix); color: white; padding: 3px 6px; border-radius: 6px; font-size: 10px; margin-left: 6px; }

        select { appearance: none; -webkit-appearance: none; background: rgba(120, 120, 128, 0.12) url("data:image/svg+xml;utf8,<svg fill='%23888' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>") no-repeat right 4px center; background-size: 14px; color: var(--text-main); padding: 6px 20px 6px 10px; border-radius: var(--radius-sm); border: 1px solid rgba(120,120,128,0.1); font-size: 10px; font-weight: 700; outline: none; cursor: pointer; }
        
        .filter-box { display: flex; flex-direction: column; }
        .filter-box label { font-size: 10px; font-weight: 800; margin-bottom: 6px; color: var(--text-sec); text-align: center; }
        .filter-box select { padding: 10px 28px 10px 14px; font-size: 13px; border-radius: var(--radius-md); }

        .actions-container { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .btn-sync { background: var(--card-bg); color: var(--text-main); border: 1px solid var(--glass-border); padding: 10px 16px; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; font-size: 11px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; margin-top: 15px; }
        .btn-global { background: var(--color-numix); color: #fff; border: none; }
        .btn-print { background: #1d1d1f; color: #fff; border: none;}

        #loading-msg { text-align: center; font-weight: 700; color: white; background: var(--color-parada); padding: 15px; border-radius: var(--radius-md); display: none; margin-bottom: 20px; }
        
        .btn-theme-floating { position: fixed; bottom: 30px; right: 30px; background: var(--glass-bg); backdrop-filter: var(--glass-blur); color: var(--text-main); border: 1px solid var(--glass-border); border-radius: 50%; width: 60px; height: 60px; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1001; }

        .custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .custom-modal-box { background: var(--bg-base); padding: 30px; border-radius: var(--radius-xl); width: 340px; text-align: center; border: 1px solid var(--glass-border); }
        .custom-modal-input { background: var(--card-bg); color: var(--text-main); width: 100%; padding: 14px; margin-bottom: 24px; border: 1px solid rgba(120,120,128,0.2); border-radius: var(--radius-md); font-size: 18px; text-align: center; outline: none; }
        .custom-modal-actions { display: flex; gap: 12px; justify-content: center; }
        .custom-modal-actions button { padding: 12px 0; border: none; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; flex: 1; font-size: 13px; text-transform: uppercase; }
        .btn-cancelar { background: rgba(120,120,128,0.15); color: var(--text-main); }
        .btn-confirmar { background: var(--color-numix); color: #fff; }

        .toast-alerta { position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--glass-bg); backdrop-filter: var(--glass-blur); color: var(--text-main); padding: 16px 24px; border-radius: 30px; box-shadow: var(--shadow-hover); z-index: 99999; display: block; font-size: 13px; font-weight: 600; text-align: center; border: 1px solid var(--glass-border); transition: transform 0.4s ease, opacity 0.4s; opacity: 0; }
        .toast-alerta.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>
    <audio id="somNotificacao" src="https://www.myinstants.com/media/sounds/uber-request.mp3" preload="auto"></audio>
    <div id="toastAlocacao" class="toast-alerta"></div>

    <div class="header">
        <div>
            <h1>📊 Monitoramento <button style="background:transparent; border:none; color:var(--text-main); cursor:pointer;" onclick="verificarSenhaConfig()">⚙️</button></h1>
            <p>Dashboard de Abastecimento</p>
        </div>
        <div class="actions-container">
            <div class="filter-box"><label>GRUPO</label><select id="filtroGrupo" onchange="trocarGrupo()"><option value="Grupo 1">Grupo 1</option><option value="Grupo 2">Grupo 2</option><option value="Grupo 3">Grupo 3</option><option value="Grupo 4">Grupo 4</option><option value="Grupo 5">Grupo 5</option><option value="Grupo 6">Grupo 6</option><option value="Grupo 7">Grupo 7</option><option value="Grupo 8">Grupo 8</option></select></div>
            <div class="filter-box"><label>MODELO</label><select id="filtroModelo" onchange="aplicarFiltroModelo()"><option value="TODOS">Todos</option></select></div>
            <div class="filter-box"><label>STATUS GLOBAL</label><select id="statusGlobal"><option value="">Selecionar...</option><option value="rodando">RODANDO</option><option value="parada">PARADA</option><option value="quebrada">QUEBRADA</option></select></div>
            <button class="btn-sync btn-global" onclick="alterarStatusGlobal()">⚡ Aplicar Global</button>
            <button class="btn-sync btn-print" onclick="gerarImpressao()">🖨️ Imprimir</button>
            <button class="btn-sync" id="btnSyncRef" onclick="sincronizarProducao()">🔄 Sincronizar ERP</button>
            <div id="status-update" style="font-size: 10px; font-weight: 700; color: var(--text-sec); text-align: center; width: 100%; margin-top: 5px;">Aguardando...</div>
        </div>
    </div>

    <div id="loading-msg"></div>
    <div class="main-container" id="stationGrid"></div>
    <button id="btnTema" class="btn-theme-floating" onclick="alternarTema()">🌙</button>

    <div id="customModalOverlay" class="custom-modal-overlay">
        <div class="custom-modal-box">
            <h3 id="customModalMessage">Mensagem</h3>
            <input type="password" id="customModalInput" class="custom-modal-input" placeholder="Seu crachá..." style="display:none;" autocomplete="off">
            <div class="custom-modal-actions"><button id="customModalBtnCancel" class="btn-cancelar">Cancelar</button><button id="customModalBtnOk" class="btn-confirmar">OK</button></div>
        </div>
    </div>

    <div id="configModalOverlay" class="custom-modal-overlay">
        <div class="custom-modal-box" style="width:450px;">
            <h3>⚙️ Cadastro - Crachás</h3>
            <div id="configMsg" style="margin-bottom:10px;"></div>
            <input type="number" id="configNovoCracha" class="custom-modal-input" placeholder="Crachá..." style="display:block; font-size:14px; margin-bottom:10px;">
            <input type="text" id="configNovoNome" class="custom-modal-input" placeholder="Nome..." style="display:block; font-size:14px;">
            <button class="btn-confirmar" style="width:100%; padding:10px; margin-bottom:10px;" onclick="adicionarCracha()">Salvar</button>
            <button onclick="document.getElementById('configModalOverlay').style.display='none'" class="btn-cancelar" style="width:100%; padding:10px;">Fechar</button>
        </div>
    </div>

    <script>
        const URL_API = "https://script.google.com/macros/s/AKfycbzVeJ6D14-2N3df36dCxMNTG-7mT-NLXHbabxiL3Bqwh-5ybe01tOiB4_V32m6WST3T/exec";
        const defaultUsuarios = { "48192292175030": "Francisco Eduardo" };
        let usuariosAutorizados = JSON.parse(localStorage.getItem('customUsuarios')) || defaultUsuarios;
        let historicoGrupos = {}; let estadoAlocacao = {}; let bgGroupIndex = 1; let estacoesGlobaisParaImpressao = {};

        async function verificarSenhaConfig() {
            const senha = await customPrompt("Senha administrativa:");
            if (senha === "14490") document.getElementById('configModalOverlay').style.display = 'flex';
            else if (senha) await customAlert("Incorreta!");
        }

        function adicionarCracha() {
            const c = document.getElementById('configNovoCracha').value; const n = document.getElementById('configNovoNome').value;
            if(!c || !n) return; usuariosAutorizados[c] = n; localStorage.setItem('customUsuarios', JSON.stringify(usuariosAutorizados));
            document.getElementById('configNovoCracha').value=''; document.getElementById('configNovoNome').value=''; alert("Salvo!");
        }

        function exibirNotificacao(cracha, dataHora, grupo) {
            const toast = document.getElementById('toastAlocacao'); const som = document.getElementById('somNotificacao');
            const nome = usuariosAutorizados[cracha] || cracha || "Usuário";
            if (som) { som.currentTime = 0; som.play().catch(() => {}); }
            toast.innerHTML = `<strong>Alocação no ${grupo}</strong><br>${nome} às ${dataHora}`;
            toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 10000);
        }

        async function carregarPainel() {
            const grupoAtual = document.getElementById('filtroGrupo').value;
            const numEstacoes = (grupoAtual === "Grupo 4" || grupoAtual === "Grupo 5") ? 48 : 36;
            try {
                const response = await fetch(`${URL_API}?grupo=${grupoAtual}&_t=${new Date().getTime()}`);
                const dados = await response.json();
                const estacoesReais = {};
                dados.forEach(d => { if (!d.grupo || d.grupo === grupoAtual) estacoesReais[d.estacao] = d; });
                estacoesGlobaisParaImpressao = estacoesReais;

                const modelosUnicos = new Set();
                Object.values(estacoesReais).forEach(d => { if (d.modelo && d.modelo !== "Não Alocado" && d.modelo !== "VAZIO") modelosUnicos.add(d.modelo.trim()); });
                const selectModelo = document.getElementById('filtroModelo'); const selecionado = selectModelo.value;
                selectModelo.innerHTML = '<option value="TODOS">Todos</option>';
                [...modelosUnicos].sort().forEach(m => { const opt = document.createElement('option'); opt.value = m; opt.textContent = m; if(m === selecionado) opt.selected = true; selectModelo.appendChild(opt); });

                const grid = document.getElementById('stationGrid'); grid.innerHTML = "";
                const containersMaquinas = {};
                for (let m = 1; m <= 3; m++) {
                    const div = document.createElement('div'); div.className = 'machine-container';
                    div.innerHTML = `<div class="machine-grid" id="grid-maq-${m}"></div>`;
                    grid.appendChild(div); containersMaquinas[m] = div.querySelector('.machine-grid');
                }

                const criarCard = (i) => {
                    const item = estacoesReais[i] || {};
                    const status = item.status || 'parada';
                    const mod = item.modelo || 'Não Alocado';
                    const tam = item.tamanho ? String(item.tamanho).replace('.', ',') : '--';
                    const card = document.createElement('div'); card.className = 'flip-card'; card.setAttribute('data-modelo', mod.trim());
                    card.onclick = function() { this.classList.add('flipped'); }; card.onmouseleave = function() { this.classList.remove('flipped'); };
                    card.innerHTML = `
                        <div class="flip-card-inner">
                            <div class="flip-card-front status-${status}">
                                <div class="card-header"><h2>EST ${String(i).padStart(2, '0')}</h2>
                                <select onclick="event.stopPropagation()" onchange="mudarStatus('${grupoAtual}', ${i}, this.value)">
                                    <option value="rodando" ${status==='rodando'?'selected':''}>RODANDO</option>
                                    <option value="parada" ${status==='parada'?'selected':''}>PARADA</option>
                                    <option value="quebrada" ${status==='quebrada'?'selected':''}>QUEBRADA</option>
                                </select></div>
                                <div class="info-row"><span class="info-label">Modelo</span><span class="info-value">${mod}</span></div>
                                <div class="info-row"><span class="info-label">Tamanho</span><span class="info-value">${tam}</span></div>
                                <div class="stats-grid">
                                    <div class="stat-box"><span class="stat-num">${item.giro||0}</span><span class="stat-label">Giro</span></div>
                                    <div class="stat-box"><span class="stat-num">${item.refilagem||0}</span><span class="stat-label">Refil</span></div>
                                    <div class="stat-box"><span class="stat-num">${item.reprovados||0}</span><span class="stat-label">Reprov</span></div>
                                </div>
                            </div>
                            <div class="flip-card-back">
                                <div style="font-size:11px; font-weight:800; text-align:center; margin-bottom:10px;">📋 DETALHES</div>
                                ${gerarListaDetalhes('Giro', item.detGiro, 'var(--text-main)')}
                                ${gerarListaDetalhes('Refilagem', item.detRefil, 'var(--text-main)')}
                                ${gerarListaDetalhes('Reprovados', item.detReprov, 'var(--color-numix)')}
                            </div>
                        </div>`;
                    return card;
                };

                const metade = numEstacoes / 2;
                for (let i = 1; i <= metade; i++) {
                    const m = Math.ceil(i / (metade/3));
                    containersMaquinas[m].appendChild(criarCard(i));
                    containersMaquinas[m].appendChild(criarCard(i + metade));
                }

                const infoData = Object.values(estacoesReais).find(d => d.dataHora);
                const strEstado = Object.values(estacoesReais).map(d => `${d.estacao}-${d.modelo || ''}-${d.tamanho || ''}`).join('|');
                let dataSalva = localStorage.getItem(`dataTravada_${grupoAtual}`) || '--';

                if (infoData && infoData.dataHora) {
                    if (!historicoGrupos[grupoAtual] || estadoAlocacao[grupoAtual] !== strEstado) {
                        estadoAlocacao[grupoAtual] = strEstado; historicoGrupos[grupoAtual] = infoData.dataHora;
                        if(infoData.dataHora.includes('/')) {
                            const p = infoData.dataHora.split(' '); dataSalva = `${p[0].substring(0, 5)} - ${p[1].substring(0, 5)}`;
                            localStorage.setItem(`dataTravada_${grupoAtual}`, dataSalva);
                            if(historicoGrupos[grupoAtual]) exibirNotificacao(infoData.cracha, infoData.dataHora, grupoAtual);
                        }
                    }
                }
                document.getElementById('status-update').innerHTML = `Sinc: ${new Date().toLocaleTimeString()} &bull; Alocação salva: ${dataSalva}`;
                aplicarFiltroModelo();
            } catch (e) { document.getElementById('loading-msg').style.display='block'; document.getElementById('loading-msg').innerText="Erro de conexão."; }
        }

        function gerarImpressao() {
            const grupoAtual = document.getElementById('filtroGrupo').value;
            const numEstacoes = (grupoAtual === "Grupo 4" || grupoAtual === "Grupo 5") ? 48 : 36;
            const metade = numEstacoes / 2;

            if (Object.keys(estacoesGlobaisParaImpressao).length === 0) { alert("Carregando dados..."); return; }

            let htmlImp = `
                <html><head><title>Alocação - ${grupoAtual}</title>
                <style>
                    body { font-family: sans-serif; font-size: 11px; margin: 10px; }
                    h2 { text-align: center; text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 5px; }
                    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
                    th, td { border: 1px solid #000; padding: 4px 2px; text-align: center; font-weight: bold; }
                    th { background: #eee; font-size: 9px; }
                    .col-est { background: #f9f9f9; width: 30px; }
                    .divisoria { background: #000; width: 2px; padding: 0; }
                </style></head><body>
                <h2>Resumo de Produção - ${grupoAtual}</h2>
                <table><thead><tr>
                    <th>EST</th><th>MODELO</th><th>TAM</th><th>G</th><th>R</th><th>X</th>
                    <th class="divisoria"></th>
                    <th>EST</th><th>MODELO</th><th>TAM</th><th>G</th><th>R</th><th>X</th>
                </tr></thead><tbody>`;

            for (let i = 1; i <= metade; i++) {
                const f = estacoesGlobaisParaImpressao[i] || {};
                const c = estacoesGlobaisParaImpressao[i + metade] || {};
                const modF = (f.modelo && f.modelo !== "Não Alocado") ? f.modelo : "";
                const modC = (c.modelo && c.modelo !== "Não Alocado") ? c.modelo : "";

                htmlImp += `<tr>
                    <td class="col-est">${String(i).padStart(2,'0')}</td>
                    <td style="text-align:left">${modF}</td>
                    <td>${f.tamanho?String(f.tamanho).replace('.',','):''}</td>
                    <td>${f.giro||0}</td><td>${f.refilagem||0}</td><td>${f.reprovados||0}</td>
                    <td class="divisoria"></td>
                    <td class="col-est">${String(i+metade).padStart(2,'0')}</td>
                    <td style="text-align:left">${modC}</td>
                    <td>${c.tamanho?String(c.tamanho).replace('.',','):''}</td>
                    <td>${c.giro||0}</td><td>${c.refilagem||0}</td><td>${c.reprovados||0}</td>
                </tr>`;
            }

            htmlImp += `</tbody></table><p style="text-align:right; font-size:8px;">G: Giro | R: Refil | X: Reprovados | Gerado em: ${new Date().toLocaleString()}</p></body></html>`;
            const win = window.open('', '_blank'); win.document.write(htmlImp); win.document.close();
            setTimeout(() => { win.print(); win.close(); }, 500);
        }

        function trocarGrupo() { localStorage.setItem('ultimoGrupoSelecionado', document.getElementById('filtroGrupo').value); carregarPainel(); }
        function aplicarFiltroModelo() { const m = document.getElementById('filtroModelo').value; document.querySelectorAll('.flip-card').forEach(c => { c.style.display = (m === "TODOS" || c.getAttribute('data-modelo') === m) ? 'block' : 'none'; }); }
        function alternarTema() { document.body.classList.toggle('dark-mode'); localStorage.setItem('temaEscuroMonitor', document.body.classList.contains('dark-mode')); document.getElementById('btnTema').innerText = document.body.classList.contains('dark-mode') ? '☀️' : '🌙'; }
        function gerarListaDetalhes(t, l, c) { if(!l || l.length===0) return ''; let h = `<div class="det-sec"><div class="det-title" style="color:${c}">${t}</div>`; l.forEach(i => { h += `<div class="det-item">COR ${i.cor} ORD ${i.ordem}#${i.pacote} <span class="prs">${i.qtd} prs</span></div>`; }); h += `</div>`; return h; }
        
        async function sincronizarProducao() { const b = document.getElementById('btnSyncRef'); b.disabled=true; b.innerText="⌛..."; try { await fetch(URL_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "syncProduction", grupo: document.getElementById('filtroGrupo').value }) }); setTimeout(() => { carregarPainel(); b.disabled=false; b.innerText="🔄 Sincronizar ERP"; }, 2000); } catch(e) { b.disabled=false; } }
        async function mudarStatus(g, e, s) { const c = await customPrompt(`EST ${e} para ${s.toUpperCase()}:`); if(!usuariosAutorizados[c]) { alert("Negado"); carregarPainel(); return; } await fetch(URL_API, { method: 'POST', body: JSON.stringify({ action: "updateStatus", grupo: g, estacao: e, status: s, cracha: c }) }); carregarPainel(); }
        async function alterarStatusGlobal() { const s = document.getElementById('statusGlobal').value; if(!s) return; const c = await customPrompt(`Mudar TUDO para ${s.toUpperCase()}:`); if(!usuariosAutorizados[c]) return; const g = document.getElementById('filtroGrupo').value; const n = (g==="Grupo 4"||g==="Grupo 5")?48:36; for(let i=1;i<=n;i++) { fetch(URL_API, { method: 'POST', body: JSON.stringify({ action: "updateStatus", grupo: g, estacao: i, status: s, cracha: c }) }); } setTimeout(carregarPainel, 2000); }

        function customAlert(m) { return new Promise(r => { document.getElementById('customModalMessage').innerText=m; document.getElementById('customModalInput').style.display='none'; document.getElementById('customModalBtnCancel').style.display='none'; document.getElementById('customModalOverlay').style.display='flex'; document.getElementById('customModalBtnOk').onclick=()=>{ document.getElementById('customModalOverlay').style.display='none'; r(true); }; }); }
        function customPrompt(m) { return new Promise(r => { document.getElementById('customModalMessage').innerText=m; const i = document.getElementById('customModalInput'); i.style.display='block'; i.value=''; document.getElementById('customModalBtnCancel').style.display='block'; document.getElementById('customModalOverlay').style.display='flex'; i.focus(); document.getElementById('customModalBtnOk').onclick=()=>{ document.getElementById('customModalOverlay').style.display='none'; r(i.value); }; document.getElementById('customModalBtnCancel').onclick=()=>{ document.getElementById('customModalOverlay').style.display='none'; r(null); }; }); }

        window.onload = () => { if(localStorage.getItem('temaEscuroMonitor')==='true') alternarTema(); const g=localStorage.getItem('ultimoGrupoSelecionado'); if(g) document.getElementById('filtroGrupo').value=g; carregarPainel(); };
        setInterval(carregarPainel, 10000);
    </script>
</body>
</html>
