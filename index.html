<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Monitoramento - Produção</title>
    <style>
        /* === VARIÁVEIS EXTRATERRESTRES === */
        :root {
            --bg-base: #f0f2f5;
            --bg-ambient-1: rgba(249, 38, 114, 0.08); 
            --bg-ambient-2: rgba(0, 122, 255, 0.08);  
            
            --glass-bg: rgba(255, 255, 255, 0.75); 
            --card-bg: #ffffff; 
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-blur: blur(20px) saturate(180%);
            
            --text-main: #1d1d1f;
            --text-sec: #86868b;
            --text-value: #000000;
            
            --color-rodando: #34c759;
            --color-parada: #ff3b30;
            --color-quebrada: #ffcc00;
            --color-numix: #f1544d;
            
            --shadow-soft: 0 8px 25px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 15px 35px rgba(0, 0, 0, 0.1);
            --shadow-glass: inset 0 1px 1px rgba(255, 255, 255, 0.8);
            
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        body.dark-mode {
            --bg-base: #0a0a0c;
            --bg-ambient-1: rgba(249, 38, 114, 0.12);
            --bg-ambient-2: rgba(10, 132, 255, 0.12);
            
            --glass-bg: rgba(28, 28, 32, 0.65);
            --card-bg: #1c1c1f; 
            --glass-border: rgba(255, 255, 255, 0.08);
            
            --text-main: #f5f5f7;
            --text-sec: #a1a1a6;
            --text-value: #ffffff;
            
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 20px 40px rgba(0, 0, 0, 0.6);
            --shadow-glass: inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(circle at 15% 50%, var(--bg-ambient-1), transparent 40%),
                radial-gradient(circle at 85% 30%, var(--bg-ambient-2), transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            padding: 20px; 
            min-height: 100vh;
            transition: background-color 0.4s ease, color 0.4s ease; 
        }
        
        .header { 
            position: sticky; top: 15px; z-index: 1000; 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 30px; padding: 15px 25px; 
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border); border-radius: var(--radius-xl); 
            box-shadow: var(--shadow-soft), var(--shadow-glass);
            flex-wrap: wrap; gap: 15px; 
        }
        .header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
        .header p { font-size: 0.85rem; font-weight: 500; color: var(--text-sec); margin-top: 2px;}

        .main-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 25px; align-items: start; }
        .machine-container { background: transparent; width: 100%; }
        .machine-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        
        /* === EFEITO FLIP CARD NITIDEZ MÁXIMA === */
        .flip-card {
            background-color: transparent; perspective: 1200px; width: 100%; min-height: 170px; cursor: pointer;
        }
        .flip-card-inner {
            position: relative; width: 100%; height: 100%; text-align: left;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            transform-style: preserve-3d; display: grid; grid-template-columns: 1fr;
        }
        .flip-card:hover .flip-card-inner { transform: translateY(-4px); }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); z-index: 10; }
        
        .flip-card-front, .flip-card-back {
            grid-area: 1 / 1 / 2 / 2; -webkit-backface-visibility: hidden; backface-visibility: hidden;
            border-radius: var(--radius-lg);
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-soft);
            padding: 16px; display: flex; flex-direction: column; justify-content: space-between;
            transition: box-shadow 0.3s ease;
            transform: translateZ(0); 
        }
        .flip-card:hover .flip-card-front { box-shadow: var(--shadow-hover); }

        .flip-card-front::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
            border-radius: var(--radius-lg) 0 0 var(--radius-lg); opacity: 0.9;
        }
        .flip-card-front.status-rodando::before { background: var(--color-rodando); box-shadow: 2px 0 10px rgba(52,199,89,0.3); }
        .flip-card-front.status-parada::before { background: var(--color-parada); box-shadow: 2px 0 10px rgba(255,59,48,0.3); }
        .flip-card-front.status-quebrada::before { background: var(--color-quebrada); box-shadow: 2px 0 10px rgba(255,204,0,0.3); }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .card-header h2 { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.5px; margin: 0; }
        .badge-repetido { background: var(--color-numix); color: #fff; padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: 800; margin-left: 8px; }
        
        .info-row { display: flex; flex-direction: column; margin-bottom: 12px; }
        .info-label { font-size: 9px; font-weight: 700; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
        .info-value { font-size: 13px; font-weight: 700; color: var(--text-value); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: auto; }
        .stat-box { text-align: center; padding: 8px 4px; border-radius: var(--radius-md); background: rgba(120, 120, 128, 0.08); border: 1px solid rgba(120, 120, 128, 0.05); }
        .stat-num { display: block; font-size: 18px; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; }
        .stat-label { font-size: 8px; font-weight: 700; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .flip-card-back { 
            transform: rotateY(180deg) translateZ(1px); 
            padding: 20px; overflow-y: auto; max-height: 240px; 
        }
        .flip-card-back::-webkit-scrollbar { width: 4px; }
        .flip-card-back::-webkit-scrollbar-thumb { background: var(--text-sec); border-radius: 10px; }
        
        .det-sec { margin-bottom: 12px; background: rgba(120, 120, 128, 0.05); padding: 12px; border-radius: var(--radius-md); border: 1px solid rgba(120,120,128,0.08); }
        .det-title { font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; border-bottom: 1px solid rgba(120,120,128,0.1); padding-bottom: 4px;}
        .det-empty { text-align: center; font-size: 12px; color: var(--text-sec); margin-top: 30px; font-weight: 600; }
        
        .det-item { font-size: 11px; color: var(--text-main); margin-bottom: 10px; font-weight: 700; line-height: 1.5; }
        .det-item span.prs { color: var(--text-main); background: var(--color-numix); color: white; padding: 3px 6px; border-radius: 6px; font-size: 10px; margin-left: 6px; box-shadow: 0 2px 4px rgba(241,84,77,0.3);}

        select { 
            appearance: none; -webkit-appearance: none;
            background: rgba(120, 120, 128, 0.12) url("data:image/svg+xml;utf8,<svg fill='%23888' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>") no-repeat right 4px center;
            background-size: 14px; color: var(--text-main); padding: 6px 20px 6px 10px; 
            border-radius: var(--radius-sm); border: 1px solid rgba(120,120,128,0.1); 
            font-size: 10px; font-weight: 700; outline: none; cursor: pointer; transition: all 0.3s; 
        }
        select:hover { background-color: rgba(120, 120, 128, 0.2); }
        
        .filter-box { display: flex; flex-direction: column; }
        .filter-box label { font-size: 10px; font-weight: 800; margin-bottom: 6px; color: var(--text-sec); text-align: center; letter-spacing: 0.5px; }
        .filter-box select { padding: 10px 28px 10px 14px; font-size: 13px; border-radius: var(--radius-md); background-size: 18px; background-position: right 8px center;}
        .filter-box select option { background-color: var(--bg-base); color: var(--text-main); }

        .actions-container { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .btn-sync { 
            background: var(--card-bg); color: var(--text-main); border: 1px solid var(--glass-border); box-shadow: var(--shadow-soft);
            padding: 10px 16px; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; 
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 15px; 
            transition: all 0.2s ease; 
        }
        .btn-sync:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); background: rgba(120,120,128,0.1); }
        .btn-global { background: var(--color-numix); color: #fff; border: none; }
        .btn-global:hover { background: #d9453e; color: #fff; }
        .btn-print { background: #1d1d1f; color: #fff; border: none;}
        .btn-print:hover { background: #333; color: #fff;}

        #loading-msg { text-align: center; font-weight: 700; color: white; background: var(--color-parada); padding: 15px; border-radius: var(--radius-md); display: none; margin-bottom: 20px; box-shadow: var(--shadow-soft); }
        
        .btn-theme-floating { 
            position: fixed; bottom: 30px; right: 30px; 
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            color: var(--text-main); border: 1px solid var(--glass-border); border-radius: 50%; 
            width: 60px; height: 60px; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; 
            box-shadow: var(--shadow-hover), var(--shadow-glass); z-index: 1001; transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); 
        }
        .btn-theme-floating:hover { transform: scale(1.1) rotate(15deg); }

        .custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        .custom-modal-box { background: var(--bg-base); padding: 30px; border-radius: var(--radius-xl); box-shadow: var(--shadow-hover); width: 340px; max-width: 90%; text-align: center; border: 1px solid var(--glass-border); }
        .custom-modal-box h3 { font-size: 16px; color: var(--text-main); margin-bottom: 24px; font-weight: 700; line-height: 1.4; white-space: pre-line; }
        .custom-modal-input { background: var(--card-bg); color: var(--text-main); width: 100%; padding: 14px; margin-bottom: 24px; border: 1px solid rgba(120,120,128,0.2); border-radius: var(--radius-md); font-size: 18px; text-align: center; outline: none; font-weight: 700; letter-spacing: 2px; transition: border-color 0.2s; }
        .custom-modal-input:focus { border-color: var(--color-numix); box-shadow: 0 0 0 3px rgba(241,84,77,0.2); }
        .custom-modal-actions { display: flex; gap: 12px; justify-content: center; }
        .custom-modal-actions button { padding: 12px 0; border: none; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; transition: 0.2s; flex: 1; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;}
        .btn-cancelar { background: rgba(120,120,128,0.15); color: var(--text-main); }
        .btn-cancelar:hover { background: rgba(120,120,128,0.25); }
        .btn-confirmar { background: var(--color-numix); color: #fff; box-shadow: 0 4px 15px rgba(241,84,77,0.3);}
        .btn-confirmar:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(241,84,77,0.4); }

        .config-btn { background: transparent; border: none; font-size: 24px; cursor: pointer; transition: 0.3s; padding: 5px; color: var(--text-main); }
        .config-btn:hover { transform: rotate(90deg); color: var(--color-numix); }
        .config-panel { width: 450px !important; text-align: left !important; }
        .config-input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid rgba(120,120,128,0.2); border-radius: var(--radius-md); font-size: 13px; font-weight: 600; outline: none; background: var(--card-bg); color: var(--text-main); }
        .config-btn-action { width: 100%; padding: 12px; background: var(--text-main); color: var(--bg-base); border: none; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; font-size: 12px; text-transform: uppercase; transition: 0.2s;}
        .config-btn-action:hover { background: var(--color-numix); color: white; }

        .toast-alerta { 
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-100px); 
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            color: var(--text-main); padding: 16px 24px; border-radius: 30px; box-shadow: var(--shadow-hover);
            z-index: 99999; display: block; font-size: 13px; font-weight: 600; text-align: center; border: 1px solid var(--glass-border);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s; opacity: 0; 
        }
        .toast-alerta.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* =========================================
           RESPONSIVIDADE: NAV BAR LADO A LADO CELULAR
           ========================================= */
        @media (max-width: 768px) {
            body { padding: 5px; }
            .header { flex-direction: column; align-items: stretch; padding: 15px; border-radius: var(--radius-md); margin-bottom: 15px; }
            .header h1 { font-size: 1.1rem; justify-content: center;}
            .header p { text-align: center; font-size: 0.75rem; }
            
            /* Navbar no celular com GRID (3 colunas, fica perfeito lado a lado) */
            .actions-container { 
                display: grid; 
                grid-template-columns: repeat(3, 1fr); 
                gap: 6px; 
                align-items: stretch;
            }
            .filter-box { width: 100%; }
            .filter-box select { padding: 8px 16px 8px 4px; font-size: 9px; background-size: 10px; width: 100%; }
            .filter-box label { font-size: 7.5px; margin-bottom: 4px; }
            
            .btn-sync { 
                width: 100%; margin-top: 0; padding: 8px 4px; 
                font-size: 9.5px; gap: 4px; 
                text-align: center; justify-content: center;
            }
            
            #status-update { grid-column: span 3; margin-top: 8px; }

            .main-container { gap: 10px; grid-template-columns: 1fr; }
            .machine-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            
            .flip-card { min-height: 140px; }
            .flip-card-front, .flip-card-back { padding: 8px; border-radius: var(--radius-md); }
            
            .card-header { margin-bottom: 8px; }
            .card-header h2 { font-size: 0.85rem; }
            .badge-repetido { font-size: 8px; padding: 1px 4px; margin-left: 4px; }
            
            .info-row { margin-bottom: 8px; }
            .info-label { font-size: 7.5px; }
            .info-value { font-size: 10.5px; }
            
            .stats-grid { gap: 4px; }
            .stat-box { padding: 4px 2px; border-radius: var(--radius-sm); }
            .stat-num { font-size: 13px; }
            .stat-label { font-size: 6px; }

            .det-sec { padding: 6px; margin-bottom: 8px; }
            .det-title { font-size: 8.5px; margin-bottom: 4px; }
            .det-item { font-size: 8.5px; margin-bottom: 6px; }
            .det-item span.prs { font-size: 8px; padding: 2px 4px; margin-left: 3px; }
            
            .btn-theme-floating { width: 45px; height: 45px; font-size: 18px; bottom: 15px; right: 15px; }
        }
    </style>
</head>
<body>
    <audio id="somNotificacao" src="https://www.myinstants.com/media/sounds/uber-request.mp3" preload="auto"></audio>

    <div id="toastAlocacao" class="toast-alerta"></div>

    <div class="header">
        <div>
            <h1>📊 Monitoramento <button class="config-btn" onclick="verificarSenhaConfig()" title="Configurações">⚙️</button></h1>
            <p>Dashboard de Abastecimento</p>
        </div>
        <div class="actions-container">
            <div class="filter-box">
                <label>GRUPO</label>
                <select id="filtroGrupo" onchange="trocarGrupo()">
                    <option value="Grupo 1">Grupo 1</option><option value="Grupo 2">Grupo 2</option>
                    <option value="Grupo 3">Grupo 3</option><option value="Grupo 4">Grupo 4</option>
                    <option value="Grupo 5">Grupo 5</option><option value="Grupo 6">Grupo 6</option>
                    <option value="Grupo 7">Grupo 7</option><option value="Grupo 8">Grupo 8</option>
                </select>
            </div>
            
            <div class="filter-box">
                <label>MODELO</label>
                <select id="filtroModelo" onchange="aplicarFiltroModelo()">
                    <option value="TODOS">Todos</option>
                </select>
            </div>

            <div class="filter-box">
                <label>STATUS GLOBAL</label>
                <select id="statusGlobal">
                    <option value="">Selecionar...</option>
                    <option value="rodando">RODANDO</option>
                    <option value="parada">PARADA</option>
                    <option value="quebrada">QUEBRADA</option>
                </select>
            </div>
            
            <button class="btn-sync btn-global" onclick="alterarStatusGlobal()">⚡ Aplicar</button>
            <button class="btn-sync btn-print" onclick="gerarImpressao()">🖨️ Imprimir</button>
            <button class="btn-sync" id="btnSyncRef" onclick="sincronizarProducao()">🔄 Atualizar</button>
            <div id="status-update">Aguardando...</div>
        </div>
    </div>

    <div id="loading-msg"></div>
    <div class="main-container" id="stationGrid"></div>

    <button id="btnTema" class="btn-theme-floating" onclick="alternarTema()" title="Alternar Tema">🌙</button>

    <div id="customModalOverlay" class="custom-modal-overlay">
        <div class="custom-modal-box">
            <h3 id="customModalMessage">Mensagem</h3>
            <input type="password" id="customModalInput" class="custom-modal-input" placeholder="Seu crachá..." style="display:none;" autocomplete="off">
            <div class="custom-modal-actions">
                <button id="customModalBtnCancel" class="btn-cancelar">Cancelar</button>
                <button id="customModalBtnOk" class="btn-confirmar">OK</button>
            </div>
        </div>
    </div>

    <div id="configModalOverlay" class="custom-modal-overlay">
        <div class="custom-modal-box config-panel">
            <h3 style="text-align: center;">⚙️ Cadastro - Crachás</h3>
            <div id="configMsg" style="height: 15px; font-size: 12px; font-weight: bold; text-align: center; margin-bottom: 15px;"></div>
            <div class="config-section">
                <input type="number" id="configNovoCracha" class="config-input" placeholder="Nº do Crachá..." autocomplete="off">
                <input type="text" id="configNovoNome" class="config-input" placeholder="Nome do Funcionário..." autocomplete="off">
                <button class="config-btn-action" onclick="adicionarCracha()">Salvar Crachá</button>
            </div>
            <div class="custom-modal-actions" style="margin-top: 15px;">
                <button onclick="fecharConfig()" class="btn-cancelar" style="width: 100%;">Concluir</button>
            </div>
        </div>
    </div>

    <script>
        // ======= NÃO ESQUEÇA DE COLAR SEU LINK AQUI =======
        const URL_API = "https://script.google.com/macros/s/AKfycbzVeJ6D14-2N3df36dCxMNTG-7mT-NLXHbabxiL3Bqwh-5ybe01tOiB4_V32m6WST3T/exec";
        
        const defaultUsuarios = { "48192292175030": "Francisco Eduardo" };
        let usuariosAutorizados = JSON.parse(localStorage.getItem('customUsuarios')) || defaultUsuarios;
        let historicoGrupos = {}; 
        let estadoAlocacao = {}; 
        let bgGroupIndex = 1;     
        
        async function verificarSenhaConfig() {
            const senha = await customPrompt("Acesso Restrito!\nSenha administrativa:");
            if (senha === "14490") document.getElementById('configModalOverlay').style.display = 'flex';
            else if (senha !== null && senha !== "") await customAlert("Senha incorreta!");
        }

        function fecharConfig() { document.getElementById('configModalOverlay').style.display = 'none'; usuariosAutorizados = JSON.parse(localStorage.getItem('customUsuarios')) || defaultUsuarios; }

        function mostrarMsgConfig(msg, cor) {
            const el = document.getElementById('configMsg'); el.style.color = cor; el.innerText = msg;
            setTimeout(() => el.innerText = '', 3500);
        }

        function adicionarCracha() {
            const cracha = document.getElementById('configNovoCracha').value.trim();
            const nome = document.getElementById('configNovoNome').value.trim();
            if(!cracha || !nome) { mostrarMsgConfig("⚠️ Preencha os campos.", "var(--color-parada)"); return; }
            usuariosAutorizados[cracha] = nome; localStorage.setItem('customUsuarios', JSON.stringify(usuariosAutorizados));
            mostrarMsgConfig(`✅ Adicionado!`, "var(--color-rodando)");
            document.getElementById('configNovoCracha').value = ''; document.getElementById('configNovoNome').value = '';
        }

        function exibirNotificacao(cracha, dataHora, grupoAlterado) {
            const toast = document.getElementById('toastAlocacao');
            const som = document.getElementById('somNotificacao');
            usuariosAutorizados = JSON.parse(localStorage.getItem('customUsuarios')) || defaultUsuarios;
            const nomeExibicao = usuariosAutorizados[cracha] || cracha || "Usuário";

            if (som) { som.currentTime = 0; som.play().catch(e => console.warn("Som bloqueado pelo nav.")); }
            toast.innerHTML = `<span style="font-size: 16px; margin-right: 8px;">🚕</span> <strong>Alocação no ${grupoAlterado}</strong><br><span style="font-weight:500; color: var(--text-sec);">${nomeExibicao} às ${dataHora}</span>`;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 10000); 
        }

        window.addEventListener('storage', function(e) {
            if(e.key === 'alocacaoGlobalSalva' && e.newValue) {
                const dados = JSON.parse(e.newValue); const chave = dados.dataHora + dados.cracha;
                if(historicoGrupos[dados.grupo] !== chave) { historicoGrupos[dados.grupo] = chave; exibirNotificacao(dados.cracha, dados.dataHora, dados.grupo); }
            }
            if(e.key === 'customUsuarios') usuariosAutorizados = JSON.parse(e.newValue);
        });

        async function checarProximoGrupoBackground() {
            const grupoAtualVisor = document.getElementById('filtroGrupo').value;
            let grupoChecar = "Grupo " + bgGroupIndex;
            bgGroupIndex++; if(bgGroupIndex > 8) bgGroupIndex = 1;
            if(grupoChecar === grupoAtualVisor) return;

            try {
                const response = await fetch(`${URL_API}?grupo=${grupoChecar}&_t=${new Date().getTime()}`, { cache: "no-store" });
                const dados = await response.json();
                const estacoesReais = {};
                dados.forEach(d => { if (!d.grupo || d.grupo === grupoChecar) estacoesReais[d.estacao] = d; });
                const listaExibida = Object.values(estacoesReais);
                const infoData = listaExibida.find(d => d.dataHora);
                
                if (infoData && infoData.dataHora) {
                    const chave = infoData.dataHora + (infoData.cracha || "");
                    const strEstado = listaExibida.map(d => `${d.estacao}-${d.modelo || ''}-${d.tamanho || ''}`).join('|');
                    if (!historicoGrupos[grupoChecar]) { historicoGrupos[grupoChecar] = chave; estadoAlocacao[grupoChecar] = strEstado; } 
                    else if (historicoGrupos[grupoChecar] !== chave) {
                        historicoGrupos[grupoChecar] = chave; 
                        if (estadoAlocacao[grupoChecar] !== strEstado) { estadoAlocacao[grupoChecar] = strEstado; exibirNotificacao(infoData.cracha, infoData.dataHora, grupoChecar); }
                    }
                }
            } catch(e) {}
        }
        setInterval(checarProximoGrupoBackground, 3500);

        function alternarTema() {
            const body = document.body; body.classList.toggle('dark-mode');
            localStorage.setItem('temaEscuroMonitor', body.classList.contains('dark-mode'));
            document.getElementById('btnTema').innerText = body.classList.contains('dark-mode') ? '☀️' : '🌙';
        }

        function customAlert(msg) {
            return new Promise(resolve => {
                const overlay = document.getElementById('customModalOverlay');
                document.getElementById('customModalMessage').innerText = msg;
                document.getElementById('customModalInput').style.display = 'none';
                document.getElementById('customModalBtnCancel').style.display = 'none';
                const btnOk = document.getElementById('customModalBtnOk'); btnOk.style.display = 'block'; btnOk.innerText = 'OK';
                overlay.style.display = 'flex'; btnOk.onclick = () => { overlay.style.display = 'none'; resolve(true); };
            });
        }

        function customPrompt(msg) {
            return new Promise(resolve => {
                const overlay = document.getElementById('customModalOverlay'); const input = document.getElementById('customModalInput');
                document.getElementById('customModalMessage').innerText = msg; input.style.display = 'block'; input.value = '';
                const btnCancel = document.getElementById('customModalBtnCancel'); const btnOk = document.getElementById('customModalBtnOk');
                btnCancel.style.display = 'block'; btnOk.style.display = 'block'; btnOk.innerText = 'Confirmar';
                overlay.style.display = 'flex'; input.focus();
                btnOk.onclick = () => { overlay.style.display = 'none'; resolve(input.value); };
                btnCancel.onclick = () => { overlay.style.display = 'none'; resolve(null); };
                input.onkeypress = (e) => { if(e.key === 'Enter') btnOk.click(); };
            });
        }

        function trocarGrupo() { localStorage.setItem('ultimoGrupoSelecionado', document.getElementById('filtroGrupo').value); carregarPainel(); }

        function aplicarFiltroModelo() {
            const modeloSelecionado = document.getElementById('filtroModelo').value;
            document.querySelectorAll('.flip-card').forEach(card => {
                const modeloCard = card.getAttribute('data-modelo');
                card.style.display = (modeloSelecionado === "TODOS" || modeloCard === modeloSelecionado) ? 'block' : 'none';
            });
        }

        function gerarListaDetalhes(titulo, lista, corTitulo) {
            if(!lista || lista.length === 0) return '';
            const grupos = {};
            lista.forEach(l => {
                const chave = `COR ${l.cor} ORD ${l.ordem}`;
                if (!grupos[chave]) { grupos[chave] = { pacotes: [], totalPares: 0 }; }
                grupos[chave].pacotes.push(l.pacote); grupos[chave].totalPares += l.qtd;
            });

            let html = `<div class="det-sec"><div class="det-title" style="color:${corTitulo}">${titulo}</div>`;
            for (const chave in grupos) {
                const pacotesAgrupados = grupos[chave].pacotes.join('#');
                const pares = grupos[chave].totalPares;
                html += `<div class="det-item">${chave}#${pacotesAgrupados} <span class="prs">${pares} prs</span></div>`;
            }
            html += `</div>`;
            return html;
        }

        async function carregarPainel() {
            const grupoAtual = document.getElementById('filtroGrupo').value;
            const numEstacoes = (grupoAtual === "Grupo 4" || grupoAtual === "Grupo 5") ? 48 : 36;
            try {
                const response = await fetch(`${URL_API}?grupo=${grupoAtual}&_t=${new Date().getTime()}`, { cache: "no-store" });
                const dados = await response.json();
                const estacoesReais = {};
                dados.forEach(d => { if (!d.grupo || d.grupo === grupoAtual) estacoesReais[d.estacao] = d; });
                const listaExibida = Object.values(estacoesReais);

                const modelosUnicos = new Set();
                listaExibida.forEach(d => { if (d.modelo && d.modelo !== "Não Alocado" && d.modelo !== "VAZIO") modelosUnicos.add(d.modelo.trim()); });

                const selectModelo = document.getElementById('filtroModelo');
                const valorSelecionadoAtual = selectModelo.value; 
                selectModelo.innerHTML = '<option value="TODOS">Todos</option>';
                [...modelosUnicos].sort().forEach(m => {
                    const opt = document.createElement('option'); opt.value = m; opt.textContent = m;
                    if (m === valorSelecionadoAtual) opt.selected = true; selectModelo.appendChild(opt);
                });

                const contagem = {};
                listaExibida.forEach(d => {
                    if (d.modelo && d.tamanho && d.modelo !== "Não Alocado" && d.modelo !== "VAZIO") {
                        const tamanhoNorm = String(d.tamanho).replace('.', ',').trim();
                        contagem[`${d.modelo.trim()}-${tamanhoNorm}`] = (contagem[`${d.modelo.trim()}-${tamanhoNorm}`] || 0) + 1;
                    }
                });

                const grid = document.getElementById('stationGrid');
                document.getElementById('loading-msg').style.display = 'none';
                grid.innerHTML = "";

                const numMaquinas = 3; const containersMaquinas = {};
                for (let m = 1; m <= numMaquinas; m++) {
                    const wrapper = document.createElement('div'); wrapper.className = `machine-container m${m}`;
                    wrapper.innerHTML = `<div class="machine-grid" id="grid-maq-${m}"></div>`;
                    grid.appendChild(wrapper); containersMaquinas[m] = wrapper.querySelector('.machine-grid');
                }

                const criarCardElemento = (i) => {
                    let item = estacoesReais[i]; 
                    const statusBanco = (item && item.status) ? item.status : 'parada';
                    const modeloBanco = (item && item.modelo) ? item.modelo : 'Não Alocado';
                    const tamanhoBanco = (item && item.tamanho) ? String(item.tamanho).replace('.', ',').trim() : '--';
                    const totalRepetido = contagem[`${modeloBanco.trim()}-${tamanhoBanco}`] || 0;
                    const badgeRepetido = totalRepetido > 1 ? `<span class="badge-repetido">${totalRepetido}x</span>` : "";

                    const hasDetails = item && (item.detGiro?.length || item.detRefil?.length || item.detReprov?.length);

                    const wrapper = document.createElement('div');
                    wrapper.className = 'flip-card'; wrapper.setAttribute('data-modelo', modeloBanco.trim());
                    wrapper.onclick = function() { this.classList.add('flipped'); };
                    wrapper.onmouseleave = function() { this.classList.remove('flipped'); };

                    wrapper.innerHTML = `
                        <div class="flip-card-inner">
                            <div class="flip-card-front status-${statusBanco}">
                                <div class="card-header">
                                    <h2>EST ${String(i).padStart(2, '0')}${badgeRepetido}</h2>
                                    <select onclick="event.stopPropagation()" onchange="mudarStatus('${grupoAtual}', ${i}, this.value)">
                                        <option value="rodando" ${statusBanco === 'rodando' ? 'selected' : ''}>RODANDO</option>
                                        <option value="parada" ${statusBanco === 'parada' ? 'selected' : ''}>PARADA</option>
                                        <option value="quebrada" ${statusBanco === 'quebrada' ? 'selected' : ''}>QUEBRADA</option>
                                    </select>
                                </div>
                                <div class="info-row"><span class="info-label">Modelo</span><span class="info-value" title="${modeloBanco}">${modeloBanco}</span></div>
                                <div class="info-row"><span class="info-label">Tamanho</span><span class="info-value">${tamanhoBanco}</span></div>
                                <div class="stats-grid">
                                    <div class="stat-box"><span class="stat-num">${item && item.giro ? item.giro : 0}</span><span class="stat-label">Giro</span></div>
                                    <div class="stat-box"><span class="stat-num">${item && item.refilagem ? item.refilagem : 0}</span><span class="stat-label">Refil</span></div>
                                    <div class="stat-box"><span class="stat-num">${item && item.reprovados ? item.reprovados : 0}</span><span class="stat-label">Reprov</span></div>
                                </div>
                            </div>
                            <div class="flip-card-back">
                                <div style="font-size:13px; font-weight:800; text-align:center; margin-bottom:12px; letter-spacing: 0.5px;">📋 PACOTES ALOCADOS</div>
                                ${gerarListaDetalhes('Giro', item ? item.detGiro : [], 'var(--text-main)')}
                                ${gerarListaDetalhes('Refilagem', item ? item.detRefil : [], 'var(--text-main)')}
                                ${gerarListaDetalhes('Reprovados', item ? item.detReprov : [], 'var(--color-numix)')}
                                ${!hasDetails ? '<div class="det-empty">Nenhum pacote detalhado.</div>' : ''}
                            </div>
                        </div>
                    `;
                    return wrapper;
                };

                const metade = numEstacoes / 2; const paresPorMaquina = metade / 3;
                for (let i = 1; i <= metade; i++) {
                    const numMaq = Math.ceil(i / paresPorMaquina);
                    containersMaquinas[numMaq].appendChild(criarCardElemento(i));
                    containersMaquinas[numMaq].appendChild(criarCardElemento(i + metade));
                }

                const infoData = listaExibida.find(d => d.dataHora);
                if (infoData && infoData.dataHora) {
                    const chave = infoData.dataHora + (infoData.cracha || "");
                    const strEstado = listaExibida.map(d => `${d.estacao}-${d.modelo || ''}-${d.tamanho || ''}`).join('|');
                    if (!historicoGrupos[grupoAtual]) { historicoGrupos[grupoAtual] = chave; estadoAlocacao[grupoAtual] = strEstado; } 
                    else if (historicoGrupos[grupoAtual] !== chave) {
                        historicoGrupos[grupoAtual] = chave; 
                        if (estadoAlocacao[grupoAtual] !== strEstado) { estadoAlocacao[grupoAtual] = strEstado; exibirNotificacao(infoData.cracha, infoData.dataHora, grupoAtual); }
                    }
                }

                let dataAlocacaoFormatada = '--';
                if (infoData && infoData.dataHora && infoData.dataHora.includes('/')) {
                    const partes = infoData.dataHora.split(' ');
                    dataAlocacaoFormatada = `${partes[0].substring(0, 5)} - ${partes[1].substring(0, 5)}`;
                }
                document.getElementById('status-update').innerHTML = `Última sincronização: ${new Date().toLocaleTimeString()} &bull; Alocação salva: ${dataAlocacaoFormatada}`;
                aplicarFiltroModelo(); 
            } catch (e) { 
                const errorBox = document.getElementById('loading-msg'); errorBox.style.display = 'block'; 
                errorBox.innerHTML = `⚠️ Erro de Rede.<br><span style="font-size:12px; font-weight: 500;">${e.message}</span>`;
            }
        }

        async function sincronizarProducao() {
            const grupoAtual = document.getElementById('filtroGrupo').value; const btn = document.getElementById('btnSyncRef');
            try {
                btn.disabled = true; btn.innerText = "⌛ Aguarde..."; document.getElementById('status-update').innerText = "Sincronizando...";
                await fetch(URL_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "syncProduction", grupo: grupoAtual }) });
                setTimeout(async () => { await customAlert('Sincronizado!'); carregarPainel(); btn.disabled = false; btn.innerHTML = "🔄 Atualizar"; }, 2000);
            } catch (error) { await customAlert('Erro na conexão.'); btn.disabled = false; btn.innerHTML = "🔄 Atualizar"; }
        }

        function gerarImpressao() {}
        async function alterarStatusGlobal() {
            const novoStatus = document.getElementById('statusGlobal').value;
            if (!novoStatus) { await customAlert("Selecione um status."); return; }
            usuariosAutorizados = JSON.parse(localStorage.getItem('customUsuarios')) || defaultUsuarios;
            const info = await customPrompt(`Alterar TODAS as estações para ${novoStatus.toUpperCase()}?\n\nDigite seu crachá:`);
            const crachaDigitado = info ? info.trim() : ""; const nomeUsuario = usuariosAutorizados[crachaDigitado];
            if (!nomeUsuario) { await customAlert("Acesso negado."); return; }
            
            const grupoAtual = document.getElementById('filtroGrupo').value;
            const numEstacoes = (grupoAtual === "Grupo 4" || grupoAtual === "Grupo 5") ? 48 : 36;
            try {
                document.getElementById('status-update').innerText = "Aplicando em lote...";
                const promessas = [];
                for (let i = 1; i <= numEstacoes; i++) {
                    promessas.push(fetch(URL_API, { method: 'POST', body: JSON.stringify({ action: "updateStatus", grupo: grupoAtual, estacao: i, status: novoStatus, cracha: crachaDigitado }) }));
                }
                await Promise.all(promessas); await customAlert(`Status global atualizado!`); carregarPainel();
            } catch (err) { carregarPainel(); }
        }
        
        async function mudarStatus(grupo, estacao, novoStatus) {
            usuariosAutorizados = JSON.parse(localStorage.getItem('customUsuarios')) || defaultUsuarios;
            const info = await customPrompt(`Mudar EST ${estacao} para ${novoStatus.toUpperCase()}.\n\nDigite seu crachá:`);
            const crachaDigitado = info ? info.trim() : ""; const nomeUsuario = usuariosAutorizados[crachaDigitado];
            if (!nomeUsuario) { await customAlert("Acesso negado."); carregarPainel(); return; }
            try { document.getElementById('status-update').innerText = "Salvando..."; await fetch(URL_API, { method: 'POST', body: JSON.stringify({ action: "updateStatus", grupo: grupo, estacao: estacao, status: novoStatus, cracha: crachaDigitado }) }); carregarPainel(); } catch (err) { carregarPainel(); }
        }

        window.onload = () => {
            if (localStorage.getItem('temaEscuroMonitor') === 'true') { document.body.classList.add('dark-mode'); document.getElementById('btnTema').innerText = '☀️'; }
            const g = localStorage.getItem('ultimoGrupoSelecionado'); if (g) document.getElementById('filtroGrupo').value = g;
            carregarPainel();
        };
        setInterval(carregarPainel, 10000);
    </script>
</body>
